name: mobile
description: "INSFP Student Mobile App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # HTTP client
  dio: ^5.4.0
  
  # State management
  provider: ^6.1.0
  
  # Local storage
  shared_preferences: ^2.2.0
  
  # Google Fonts (Inter)
  google_fonts: ^6.1.0
  
  # Date formatting
  intl: ^0.19.0
  
  # File picker for homework submission
  file_picker: ^8.0.0
  
  # Open URLs / downloaded files
  url_launcher: ^6.2.0
  
  # File download path
  path_provider: ^2.1.0
  
  # Loading skeleton animations
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
